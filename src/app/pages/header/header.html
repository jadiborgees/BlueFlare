<header class="header">
  <div class="brand">
    <img src="/assets/images/logo-blueflare.png" alt="Blue Flare" class="logo" />
  </div>

  <button class="menu-toggle" (click)="menuAberto = !menuAberto">
    ☰
  </button>

  <nav class="nav" [class.open]="menuAberto">
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="menuAberto = false"
    >
      Home
    </a>

    <a
      routerLink="/quem-somos"
      routerLinkActive="active"
      (click)="menuAberto = false"
    >
      Quem Somos
    </a>

    <a
      routerLink="/contato"
      routerLinkActive="active"
      (click)="menuAberto = false"
    >
      Contato
    </a>
  </nav>

  <a class="buy-btn" routerLink="/contato">
    COMPRE CONOSCO
  </a>
</header>
